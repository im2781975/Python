<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css" />
  <style type = "text/css">
body{
  margin: 0;
  padding: 0;
}

.nav-container{
  background-color: gray;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 15px;
}

.logo{
  width: 100px;
}

.item-container{
  display: flex;
  gap: 20px;
  list-style: none;
}

.menu{
  text-decoration: none;
  color: black;
  font-weight: bold;
}

.btn{
  padding: 15px 30px;
  outline: none;
  border: none;
}

.primary-btn{
  background-color: red;
  color: white;
}

.banner-container{
  width: 100%;
  height: 100vh;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url(./source.png);
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  background-blend-mode: overlay;
}

.desc{
  width: 100%;
  text-align: center;
  margin: auto;
  margin-bottom: 30px;
}

.title{
  font-size: 56px;
}

.digital{
  font-weight: bold;
}

.card{
  width: 250px;
  height: 300px;
  border: 1px solid gray;
}

.card-img{
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-container{
  display: flex;
  justify-content: space-around;
}

.blog-container{
  text-align: center;
}
  </style>
</head>
<body>
  <nav class="nav-container">
    <div class="logo-container">
      <img class="logo" src="./logo.png" alt="" />
    </div>
    <div class="menu-container">
      <ul class="item-container">
        <li><a class="menu" target="_blank" href="">Home</a></li>
        <li><a href="">Contact</a></li>
        <li><a href="">Login</a></li>
      </ul>
    </div>
  </nav>

  <section class="product">
    <div class="cards-container">
      <h1 class="section-title">This is product section</h1>
      <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
    </div>
  </section>

  <section class="banner-container">
    <div>
      <h1 class="title"><span class="digital">Here</span> you <br> are</h1>
      <p class="desc">whatt</p>
      <button class="btn primary-btn">Contact me</button>
      <button class="btn">Hire me</button>
    </div>
  </section>

  <section class="blog-container">
    <h1>Blog & News</h1>
    <p>paragraph</p>
    <div class="card-container">
      <div class="card">
        <img class="card-img" src="./source.png" alt="" />
      </div>
    </div>
  </section>
</body>
</html>
